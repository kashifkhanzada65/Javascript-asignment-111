<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loading()">

    <div class="container" id="page1">

        <div class="header">
            <div>
                <h1>QUIZ APPLICATION</h1>
                <p>(HTML,CSS,Javascript)</p>
            </div>

            <p id="p">user : M.Kashif</p>

        </div>
        <div class="body">

            <h1 id="h1">full form of html</h1>


            <div>
                <ul id="ul">

                </ul>
            </div>
        </div>
        <div class="footer">
            <p id="quizNum">1/10</p>
            <button disabled id="button" onclick="nextQuestion()">NEXT</button>
        </div>

    </div>
    <div class="reportCard-parent" id="page2">
        <div class="reportCard">
            <div>
                <h1>Result</h1>
            </div>
            <div>
                <p id="totalQuestion">Total Question = 100</p>
                <p id="rightAnswer">Right Answer = 100</p>
                <p id="wrongAnswer">Wrong Answer = 100</p>
                <p id="grade">Grade = 100</p>
                <div class="try-btn">
                    <button onclick="againGame()">Again Try</button>
                </div>

            </div>

        </div>
    </div>



<script src="app.js"></script>
</body>


</html>
