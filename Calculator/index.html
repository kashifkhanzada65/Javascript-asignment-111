<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="calcParent">
        <div class="calculator">
            <input disabled id="inputField" class="calInput" type="text">
            <br>
            <input class="buttonStyle btn1" type="button" value="AC" onclick="calDelAllValue()">
            <input class="buttonStyle btn1" type="button" value="DEL" onclick="calDelValue()">
            <input class="buttonStyle" type="button" value="%" onclick="calPer()">
            <input class="buttonStyle" type="button" value="/" onclick="calc('/')">
            <br>
            <input  class="buttonStyle" type="button" value="7" onclick="calc(7)">
            <input class="buttonStyle" type="button" value="8" onclick="calc(8)">
            <input class="buttonStyle" type="button" value="9" onclick="calc(9)">
            <input class="buttonStyle" type="button" value="*" onclick="calc('*')">
            <br>
            <input class="buttonStyle" type="button" value="4" onclick="calc(4)">
            <input class="buttonStyle" type="button" value="5" onclick="calc(5)">
            <input class="buttonStyle" type="button" value="6" onclick="calc(6)">
            <input class="buttonStyle" type="button" value="-" onclick="calc('-')">
            <br>
            <input class="buttonStyle" type="button" value="1" onclick="calc(1)">
            <input class="buttonStyle" type="button" value="2" onclick="calc(2)">
            <input class="buttonStyle" type="button" value="3" onclick="calc(3)">
            <input class="buttonStyle" type="button" value="+" onclick="calc('+')">
            <br>
            <input class="btn0" type="button" value="0" onclick="calc(0)">
            <input class="buttonStyle" type="button" value="." onclick="calc('.')">
            <input class="buttonStyle" type="button" value="=" onclick="calcAns()">




            
        </div>
    </section>
	
		

	
















    
</body>
<script src="app.js"></script>
</html>
