<div class="left">
    <h2>STOPWATCH</h2>
    <img src="https://cdn-icons-png.flaticon.com/512/2972/2972531.png" alt="stopwatch">
  </div>

<div class="stopwatch">

  <div class="time">
    <h1 id="minHeading">00</h1>
    <span>:</span>
    <h1 id="secHeading">00</h1>
    <span>:</span>
    <h1 id="msecHeading">00</h1>
  </div>

  <div class="buttons">
    <button class="start" onclick="startTimer()" >Start</button>
    <button class="stop" onclick="stopTimer()">Stop</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
  </div>

</div>
